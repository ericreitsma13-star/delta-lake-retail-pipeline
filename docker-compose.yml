version: "3.9"

# ---------------------------------------------------------------------------
# Shared Airflow configuration (DRY via YAML anchor)
# ---------------------------------------------------------------------------
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    SPARK_LOCAL_IP: "127.0.0.1"
    PYTHONPATH: /app
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data:/app/data
    - ./src:/app/src
  depends_on:
    postgres:
      condition: service_healthy

services:

  # -------------------------------------------------------------------------
  # Existing services (unchanged)
  # -------------------------------------------------------------------------

  spark-master:
    build: .
    container_name: spark-master
    command: tail -f /dev/null
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./run_pipeline.py:/app/run_pipeline.py
      - ./requirements.txt:/app/requirements.txt

  spark-worker:
    build: .
    container_name: spark-worker
    command: tail -f /dev/null
    environment:
      - PYTHONPATH=/app
    depends_on:
      - spark-master
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      - CATALOG_CATALOG__IMPL=org.apache.iceberg.hadoop.HadoopCatalog
      - CATALOG_WAREHOUSE=/app/data/iceberg
      - CATALOG_IO__IMPL=org.apache.iceberg.hadoop.HadoopFileIO
    volumes:
      - ./data/iceberg:/app/data/iceberg

  trino:
    image: trinodb/trino:435
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
      - ./data/iceberg:/app/data/iceberg
    depends_on:
      - iceberg-rest

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./api:/app/api
    depends_on:
      - spark-master

  # -------------------------------------------------------------------------
  # Airflow
  # -------------------------------------------------------------------------

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    # Run DB migration and create the admin user, then exit.
    # The || true on users create makes it idempotent on subsequent starts.
    command:
      - bash
      - -c
      - >
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname Admin
          --role Admin
          --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8090:8080"   # 8080 is taken by Trino
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
