version: "3.8"

services:
  spark-master:
    build: .
    container_name: spark-master
    command: tail -f /dev/null
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests
      - ./scripts:/app/scripts
      - ./run_pipeline.py:/app/run_pipeline.py
      - ./requirements.txt:/app/requirements.txt

  spark-worker:
    build: .
    container_name: spark-worker
    command: tail -f /dev/null
    environment:
      - PYTHONPATH=/app
    depends_on:
      - spark-master
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./tests:/app/tests

  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      - CATALOG_CATALOG__IMPL=org.apache.iceberg.hadoop.HadoopCatalog
      - CATALOG_WAREHOUSE=/app/data/iceberg
      - CATALOG_IO__IMPL=org.apache.iceberg.hadoop.HadoopFileIO
    volumes:
      - ./data/iceberg:/app/data/iceberg

  trino:
    image: trinodb/trino:435
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
      - ./data/iceberg:/app/data/iceberg
    depends_on:
      - iceberg-rest

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./api:/app/api
    depends_on:
      - spark-master
